services:
    database:
        build: database
        restart: always
        environment:
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_USER=postgres
            - POSTGRES_DB=postgres
        volumes:
            - database-volume:/var/lib/postgresql

    reverseproxy:
        build: reverseproxy
        ports:
            - 80:8080
        restart: always

    frontend:
        build: frontend
        depends_on:
            - reverseproxy
        restart: always

    backend:
        depends_on:
            - reverseproxy
            - database
        command: [ "/bin/bash", "-c", "python3 /backend/app/migrate.py && fastapi dev --reload --host 0.0.0.0 --port 4000" ]
        environment:
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        build: backend
        restart: always

volumes:
    database-volume:
        driver: local
        driver_opts:
            type: 'none'
            o: 'bind'
            device: '${PWD}/postgres_data'
